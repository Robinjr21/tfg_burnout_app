version: "3.9"

services:
  db:
    image: postgres:14
    container_name: burnout-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: burnout_user
      POSTGRES_PASSWORD: burnout_pass
      POSTGRES_DB: burnout_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U burnout_user -d burnout_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: burnout-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
